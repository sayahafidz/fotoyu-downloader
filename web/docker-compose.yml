# Fotoyu Downloader — self-hosted with Docker + Caddy (auto HTTPS)
#
# Usage:
#   1. Copy .env.example to .env, edit NEXT_PUBLIC_APP_URL.
#   2. Edit Caddyfile, replace fotoyu.example.com with your domain.
#   3. docker compose up -d --build
#
# Caddy will auto-provision a Let's Encrypt TLS certificate for your domain.
# Make sure your domain's A/AAAA DNS records point to this server before
# starting, otherwise the TLS challenge will fail.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fotoyu-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # Pass through so the app/build can read it.
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://fotoyu.example.com}
    # Do not publish port directly; Caddy proxies to it on the internal
    # docker network. If you want to skip Caddy, uncomment the lines below.
    # ports:
    #   - "3000:3000"
    networks:
      - fotoyu-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    container_name: fotoyu-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      # Used inside Caddyfile via {$APP_DOMAIN}
      APP_DOMAIN: ${APP_DOMAIN:-fotoyu.example.com}
    depends_on:
      web:
        condition: service_healthy
    networks:
      - fotoyu-net

networks:
  fotoyu-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
